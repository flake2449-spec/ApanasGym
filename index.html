<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-txt: var(--tg-theme-button-text-color, #ffffff);
            --sec: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .card { background: var(--sec); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .card:active { opacity: 0.6; background: #ddd; }
        input { width: 80%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 18px; text-align: center; }
        .save-btn { width: 100%; padding: 15px; background: var(--btn); color: var(--btn-txt); border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .save-btn:active { transform: scale(0.98); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-cats">
        <h3>Группа мышц:</h3>
        <div id="cat-list"></div>
    </div>

    <div id="screen-exs" class="hidden">
        <h3 id="cat-name"></h3>
        <div id="ex-list"></div>
        <button onclick="showCats()" style="background:none; border:none; color:gray; width:100%; padding:10px;">⬅ Назад</button>
    </div>

    <div id="screen-input" class="hidden">
        <h3 id="ex-name"></h3>
        <input type="number" id="w" placeholder="Вес (кг)" inputmode="decimal">
        <input type="number" id="r" placeholder="Повторы" inputmode="numeric">
        <button class="save-btn" id="main-save-btn" onclick="sendData()">СОХРАНИТЬ</button>
        <button onclick="showExs()" style="background:none; border:none; color:gray; width:100%; padding:10px;">⬅ Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const data = {
            "Грудь": ["Жим лежа", "Жим гантелей"],
            "Спина": ["Подтягивания", "Становая тяга"],
            "Ноги": ["Приседания", "Выпады"]
        };

        let curCat = "";
        let curEx = "";

        function showCats() {
            const list = document.getElementById('cat-list');
            list.innerHTML = '';
            for (let c in data) {
                let d = document.createElement('div');
                d.className = 'card';
                d.innerText = c;
                d.onclick = function() { curCat = c; showExs(); };
                list.appendChild(d);
            }
            document.getElementById('screen-cats').classList.remove('hidden');
            document.getElementById('screen-exs').classList.add('hidden');
            document.getElementById('screen-input').classList.add('hidden');
        }

        function showExs() {
            document.getElementById('cat-name').innerText = curCat;
            const list = document.getElementById('ex-list');
            list.innerHTML = '';
            data[curCat].forEach(e => {
                let d = document.createElement('div');
                d.className = 'card';
                d.innerText = e;
                d.onclick = function() { curEx = e; showInput(); };
                list.appendChild(d);
            });
            document.getElementById('screen-cats').classList.add('hidden');
            document.getElementById('screen-exs').classList.remove('hidden');
            document.getElementById('screen-input').classList.add('hidden');
        }

        function showInput() {
            document.getElementById('ex-name').innerText = curEx;
            document.getElementById('screen-exs').classList.add('hidden');
            document.getElementById('screen-input').classList.remove('hidden');
        }

        function sendData() {
    const weight = document.getElementById('w').value;
    const reps = document.getElementById('r').value;

    if (!weight || !reps) {
        tg.showAlert("Заполни поля!");
        return;
    }

    const payload = JSON.stringify({
        exercise: curEx,
        weight: parseFloat(weight),
        reps: parseInt(reps)
    });

    // ПРОВЕРКА: Разрешена ли отправка данных?
    if (tg.initData === "") {
        tg.showAlert("Ошибка: Приложение запущено как обычный сайт. Отправка данных запрещена. Запустите через кнопку Menu в боте!");
    } else {
        try {
            tg.sendData(payload);
            // Если через 500мс приложение не закрылось — значит команда игнорируется системой
            setTimeout(() => {
                tg.showAlert("Команда отправлена, но Telegram её проигнорировал. Проверьте настройки BotFather.");
            }, 500);
        } catch (e) {
            tg.showAlert("Ошибка при отправке: " + e);
        }
    }
}

        // Старт
        showCats();
    </script>
</body>
</html>
